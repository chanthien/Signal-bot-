services:
  signal-bot:
    image: ${IMAGE_NAME:-signal-bot:local}
    build: .
    container_name: signal-bot
    restart: unless-stopped
    command: ["python", "-m", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "1"]

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - ./logs:/app/logs

    depends_on:
      - signal-bot-executor

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  signal-bot-executor:
    image: ${IMAGE_NAME:-signal-bot:local}
    build: .
    container_name: signal-bot-executor
    restart: unless-stopped
    command: ["python", "-m", "uvicorn", "executor_api:app", "--host", "0.0.0.0", "--port", "8010", "--workers", "1"]
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
